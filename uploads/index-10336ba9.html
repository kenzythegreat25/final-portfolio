<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Geometric Animation</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #05070c;
      font-family: sans-serif;
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #05070c;
    }

    .base {
      position: absolute;
      inset: 0;
      background-image: url('/mnt/data/1778046556475-ckljxftbc6d.jpg');
      background-size: cover;
      background-position: center;
      transform: scale(1.01);
    }

    /* ============================
       LUMINOUS CIRCUIT GLOW
    ============================ */

    .glow-layer {
      position: absolute;
      inset: 0;

      background-image: url('/mnt/data/1778046556475-ckljxftbc6d.jpg');
      background-size: cover;
      background-position: center;

      mix-blend-mode: screen;
      opacity: 0.10;

      filter:
        brightness(1.15)
        contrast(1.08)
        blur(0.7px);

      animation:
        glowPulse 15s ease-in-out infinite,
        glowShift 7.5s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0% {
        opacity: 0.10;
        filter:
          brightness(1.10)
          contrast(1.05)
          blur(0.6px);
      }

      15% {
        opacity: 0.14;
      }

      30% {
        opacity: 0.11;
      }

      50% {
        opacity: 0.16;
        filter:
          brightness(1.18)
          contrast(1.10)
          blur(0.9px);
      }

      70% {
        opacity: 0.11;
      }

      85% {
        opacity: 0.13;
      }

      100% {
        opacity: 0.10;
        filter:
          brightness(1.10)
          contrast(1.05)
          blur(0.6px);
      }
    }

    @keyframes glowShift {
      0%, 100% {
        transform: translateX(0px);
      }

      50% {
        transform: translateX(1px);
      }
    }

    /* ============================
       METALLIC SHIMMER
    ============================ */

    .shimmer {
      position: absolute;
      inset: -20%;

      background:
        linear-gradient(
          120deg,
          transparent 0%,
          transparent 43%,
          rgba(255,255,255,0.015) 47%,
          rgba(255,255,255,0.05) 50%,
          rgba(255,255,255,0.015) 53%,
          transparent 58%,
          transparent 100%
        );

      mix-blend-mode: screen;
      opacity: 0.35;

      animation: shimmerMove 15s linear infinite;
    }

    @keyframes shimmerMove {
      0% {
        transform: translateX(-18%) translateY(0%);
        opacity: 0;
      }

      10% {
        opacity: 0.18;
      }

      30% {
        opacity: 0.28;
      }

      50% {
        opacity: 0.18;
      }

      75% {
        opacity: 0.08;
      }

      100% {
        transform: translateX(18%) translateY(0%);
        opacity: 0;
      }
    }

    /* ============================
       GRID BREATHING
    ============================ */

    .grid-breath {
      position: absolute;
      inset: 0;

      background:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,0.012) 0px,
          rgba(255,255,255,0.012) 1px,
          transparent 1px,
          transparent 32px
        ),
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,0.012) 0px,
          rgba(255,255,255,0.012) 1px,
          transparent 1px,
          transparent 32px
        );

      opacity: 0.04;
      mix-blend-mode: screen;

      mask-image:
        radial-gradient(circle at center,
          transparent 0%,
          rgba(0,0,0,0.3) 30%,
          rgba(0,0,0,0.95) 100%);

      animation: gridPulse 15s ease-in-out infinite;
    }

    @keyframes gridPulse {
      0% {
        opacity: 0.04;
      }

      25% {
        opacity: 0.05;
      }

      50% {
        opacity: 0.045;
      }

      75% {
        opacity: 0.055;
      }

      100% {
        opacity: 0.04;
      }
    }

    /* ============================
       PARTICLES
    ============================ */

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: rgba(255,255,255,0.45);
      filter: blur(0.4px);
      opacity: 0.18;
    }

    .p1 {
      top: 22%;
      left: 18%;
      animation: drift1 15s linear infinite;
    }

    .p2 {
      top: 72%;
      left: 76%;
      animation: drift2 12s linear infinite;
    }

    .p3 {
      top: 48%;
      left: 12%;
      animation: drift3 10s linear infinite;
    }

    @keyframes drift1 {
      0% {
        transform: translate(0px, 0px);
        opacity: 0.08;
      }

      50% {
        transform: translate(20px, -12px);
        opacity: 0.22;
      }

      100% {
        transform: translate(0px, 0px);
        opacity: 0.08;
      }
    }

    @keyframes drift2 {
      0% {
        transform: translate(0px, 0px);
        opacity: 0.06;
      }

      50% {
        transform: translate(-16px, 14px);
        opacity: 0.18;
      }

      100% {
        transform: translate(0px, 0px);
        opacity: 0.06;
      }
    }

    @keyframes drift3 {
      0% {
        transform: translate(0px, 0px);
        opacity: 0.05;
      }

      50% {
        transform: translate(12px, 16px);
        opacity: 0.16;
      }

      100% {
        transform: translate(0px, 0px);
        opacity: 0.05;
      }
    }

    /* ============================
       CENTER SAFE ZONE
    ============================ */

    .center-safe {
      position: absolute;
      top: 30%;
      left: 30%;
      width: 40%;
      height: 40%;

      background:
        radial-gradient(circle,
          rgba(0,0,0,0.015) 0%,
          rgba(0,0,0,0.05) 70%,
          rgba(0,0,0,0) 100%);

      pointer-events: none;
    }

    /* ============================
       FILM DEPTH
    ============================ */

    .noise {
      position: absolute;
      inset: 0;

      background-image:
        radial-gradient(rgba(255,255,255,0.015) 0.5px, transparent 0.5px);

      background-size: 4px 4px;
      mix-blend-mode: soft-light;
      opacity: 0.12;

      animation: noiseShift 15s linear infinite;
    }

    @keyframes noiseShift {
      0% {
        transform: translate(0px, 0px);
      }

      50% {
        transform: translate(2px, 1px);
      }

      100% {
        transform: translate(0px, 0px);
      }
    }

  </style>
</head>
<body>

  <div class="scene">

    <div class="base"></div>

    <div class="glow-layer"></div>

    <div class="shimmer"></div>

    <div class="grid-breath"></div>

    <div class="particle p1"></div>
    <div class="particle p2"></div>
    <div class="particle p3"></div>

    <div class="noise"></div>

    <div class="center-safe"></div>

  </div>

</body>
</html>
